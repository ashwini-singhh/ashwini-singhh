name: Standard CI Pipeline

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: '1.21'
      python-version:
        required: false
        type: string
        default: '3.10'
      node-version:
        required: false
        type: string
        default: '20'
      run-docker:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

jobs:
  # --- QUALITY & SECURITY GATE ---
  analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Security: Generic Secret Scanning
      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      # Go Analysis
      - name: Check Go
        id: check_go
        run: |
          if [ -f "go.mod" ]; then echo "exists=true" >> $GITHUB_OUTPUT; fi
      
      - name: Go Lint & Security
        if: steps.check_go.outputs.exists == 'true'
        uses: securego/gosec@master
        with:
          args: ./...

      # Python Analysis
      - name: Check Python
        id: check_python
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then echo "exists=true" >> $GITHUB_OUTPUT; fi
      
      - name: Python Bandit (Security)
        if: steps.check_python.outputs.exists == 'true'
        run: |
          pip install bandit
          bandit -r . -x ./tests

  # --- TESTING PHASE ---
  test:
    name: Unit & Integration Tests
    needs: analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go Tests
      - name: Check Go
        id: check_go
        run: |
          if [ -f "go.mod" ]; then echo "exists=true" >> $GITHUB_OUTPUT; fi
      
      - name: Setup Go
        if: steps.check_go.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      
      - name: Run Go Tests
        if: steps.check_go.outputs.exists == 'true'
        run: go test -v ./...

      # Python Tests
      - name: Check Python
        id: check_python
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then echo "exists=true" >> $GITHUB_OUTPUT; fi
      
      - name: Setup Python
        if: steps.check_python.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      
      - name: Run Python Tests
        if: steps.check_python.outputs.exists == 'true'
        run: |
          pip install pytest
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          pytest

  # --- BUILD & ARTIFACTS ---
  build:
    name: Containerize & Push
    needs: test
    if: inputs.run-docker == true
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_CREDS: ${{ secrets.DOCKER_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: env.HAS_DOCKER_CREDS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ env.HAS_DOCKER_CREDS == 'true' }}
          tags: ${{ github.repository }}:latest
